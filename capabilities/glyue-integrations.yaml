      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: glyue-integrations.createintegration
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-integration
      description: Get Integration
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: glyue-integrations.getintegration
      outputParameters:
      - type: object
        mapping: $.
    - name: update-integration
      description: Update Integration
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: glyue-integrations.updateintegration
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-integration
