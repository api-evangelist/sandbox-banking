naftiko: 1.0.0-alpha2
info:
  label: Sandbox Banking Glyue Integration Gateway API — Field Mappings
  description: 'Sandbox Banking Glyue Integration Gateway API — Field Mappings. 2 operations. Lead operation: List Field Mappings.
    Self-contained Naftiko capability covering one Sandbox Banking business surface.'
  tags:
  - Sandbox Banking
  - Field Mappings
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SANDBOX_BANKING_API_KEY: SANDBOX_BANKING_API_KEY
capability:
  consumes:
  - type: http
    namespace: glyue-field-mappings
    baseUri: https://{tenant}.sandboxbanking.com/api
    description: Sandbox Banking Glyue Integration Gateway API — Field Mappings business capability. Self-contained, no shared
      references.
    resources:
    - name: integrations-integrationId-field-mappings
      path: /integrations/{integrationId}/field-mappings
      operations:
      - name: listfieldmappings
        method: GET
        description: List Field Mappings
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createfieldmapping
        method: POST
        description: Create Field Mapping
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.SANDBOX_BANKING_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: glyue-field-mappings-rest
    port: 8080
    description: REST adapter for Sandbox Banking Glyue Integration Gateway API — Field Mappings. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/integrations/{integrationid}/field-mappings
      name: integrations-integrationid-field-mappings
      description: REST surface for integrations-integrationId-field-mappings.
      operations:
      - method: GET
        name: listfieldmappings
        description: List Field Mappings
        call: glyue-field-mappings.listfieldmappings
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createfieldmapping
        description: Create Field Mapping
        call: glyue-field-mappings.createfieldmapping
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: glyue-field-mappings-mcp
    port: 9090
    transport: http
    description: MCP adapter for Sandbox Banking Glyue Integration Gateway API — Field Mappings. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: list-field-mappings
      description: List Field Mappings
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: glyue-field-mappings.listfieldmappings
      outputParameters:
      - type: object
        mapping: $.
    - name: create-field-mapping
      description: Create Field Mapping
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: glyue-field-mappings.createfieldmapping
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
