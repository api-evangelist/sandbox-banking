- aid: sandbox-banking:mockbank
  name: Mock Bank API
  description: The Mock Bank API provides a sandbox environment for testing and developing banking integrations without connecting
    to production core banking systems. It simulates standard banking operations including account management, transactions,
    and customer data in a controlled test environment.
  humanURL: https://mockbank.docs.sandboxbanking.com/
  tags:
  - Banking
  - Mock API
  - Sandbox
  - Testing
  properties:
