apis:
- aid: sandbox-banking:glyue
  name: Glyue Integration Gateway API
  description: The Glyue Integration Gateway API provides programmatic access to the Sandbox Banking integration platform
    for building, managing, and monitoring banking integrations. The API supports creating and executing integration workflows,
    managing service request adapters, configuring field mappings, value mappings, validation rules, and accessing run history
    audit logs.
  humanURL: https://glyue.docs.sandboxbanking.com/
  baseURL: https://{tenant}.sandboxbanking.com/api
  tags:
