aid: sandbox-banking
name: Sandbox Banking
description: Sandbox Banking (now nCino Integration Gateway) is an Integration Platform as a Service (iPaaS) purpose-built
  for financial institutions. The platform enables banks and credit unions to connect core banking systems (Fiserv, Jack Henry,
  FIS, and 14+ other cores) with fintech applications, loan origination systems, CRMs, KYC/AML providers, and 50+ financial
  services solutions. Glyue, the core integration framework, provides low-code workflow automation with Python extensibility,
  audit trails, role-based access control, and regulatory compliance features aligned with CFPB Section 1033, GLBA, and FFIEC
  guidelines.
url: https://glyue.docs.sandboxbanking.com/
tags:
- API Integration
- Banking
- Core Banking
- Credit Unions
- Financial Services
- Fintech
- Integration Platform
- iPaaS
- Open Banking
